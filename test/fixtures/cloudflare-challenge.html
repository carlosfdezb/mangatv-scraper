<!DOCTYPE html>

<head>

  <style>
    body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .cf-wrapper { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #1a1a2e; }
    .cf-content { text-align: center; color: #fff; padding: 40px; }
    .cf-logo { margin-bottom: 20px; }
    .cf-title { font-size: 24px; margin-bottom: 15px; }
    .cf-text { font-size: 14px; color: #a0a0a0; margin-bottom: 20px; }
    .cf-loader { 
      width: 40px; height: 40px; border: 3px solid #3a3a5a; 
      border-top-color: #f48120; border-radius: 50%; 
      animation: spin 1s linear infinite; margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <!-- Cloudflare challenge detection markers -->

      <div class="cf-logo">

          <path d="M50 10 L60 40 L95 40 L68 58 L78 90 L50 70 L22 90 L32 58 L5 40 L40 40 Z" fill="#fff"/>
        </svg>
      </div>
      <h1 class="cf-title">Verificación de seguridad de Cloudflare</h1>
      <p class="cf-text">Por favor, espera mientras verificamos que eres humano...</p>
      <div class="cf-loader"></div>
      <p class="cf-text">Esta verificación ayuda a proteger MangasTV de accesos automatizados.</p>
